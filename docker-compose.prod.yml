# Production Docker Compose Configuration
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # 1. Database: TimescaleDB (Production Configuration)
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: telehealth_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-123456}
      - POSTGRES_DB=${DB_NAME:-telehealth_system}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - telehealth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-telehealth_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. MQTT Broker: Mosquitto (Production Configuration)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: telehealth_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - telehealth
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-u", "server", "-P", "111111", "-t", "healthcheck", "-m", "ping", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Backend: Node.js / Express API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telehealth_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env          # Load toàn bộ biến từ file .env
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgres://admin:123456@db:5432/telehealth_system  # hardcode thẳng
      - MQTT_BROKER=mqtt://mosquitto:1883
      - FRONTEND_URL=http://64.176.80.227:3001
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - telehealth
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 4. Frontend: Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.yourdomain.com}
        - NODE_ENV=production
    container_name: telehealth_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.yourdomain.com}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - telehealth

volumes:
  pgdata:
    driver: local

networks:
  telehealth:
    driver: bridge
